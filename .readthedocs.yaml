version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      # Install the package without its heavy scientific dependencies.
      # All heavy deps are mocked in docs/source/conf.py via autodoc_mock_imports,
      # so only the lightweight deps listed in docs/requirements.txt are needed.
      - pip install --no-deps -e .

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - requirements: docs/requirements.txt
